<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recipe Vault</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #dce7ee;
            text-align: center;
        }

        h1 {
            margin-top: 30px;
            color: #333;
            font-weight: 600;
        }

        /* Search Section */
        .search-section {
            margin: 20px 0 40px 0;
        }

        .search-section input {
            padding: 10px;
            width: 280px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin-left: 8px;
            color: white;
        }

        .btn-orange {
            background-color: #f0caa3;
        }

        .btn-blue {
            background-color: #3b82c4;
        }

        /* Card Container (Horizontal Layout) */
        .container {
            width: 85%;
            margin: auto;
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap; /* Makes it responsive */
        }

        /* Card */
        .card {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.08);
            text-align: left;
            width: 250px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .card:hover {
           transform: scale(1.05);
           box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }

         /* Press effect when clicking */
        .card:active {
           transform: scale(0.97);
        }
        .card h3 {
            margin-top: 0;
            margin-bottom: 10px;
            color: #333;
        }

        .card p {
            margin: 6px 0;
            color: #666;
            font-size: 14px;
        }

        .badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
            margin-top: 10px;
        }

        .easy {
            background-color: #d4edda;
            color: #2f7a3e;
        }

        .medium {
            background-color: #f8e3b1;
            color: #9a6b00;
        }
    </style>
</head>

<body>

    <h1>Recipe Vault</h1>

    <div class="search-section">
        <input type="text" placeholder="Search recipe..">
        <button class="btn btn-orange">Search</button>
        <button class="btn" style="background:#6c757d;">Show All</button>
        <button class="btn btn-blue">Add Recipe</button>
    </div>

    <div class="container">

        <div class="card">
            <h3>Classic Margherita Pizza</h3>
            <p>Italian | 35 min | 4 servings</p>
            <p>Rating: 4.6/5</p>
            <span class="badge easy">Easy</span>
        </div>
        
        <div class="card">
            <h3>Vegetarian Stir-Fry</h3>
            <p>Asian | 27 min | 3 servings</p>
            <p>Rating: 4.7/5</p>
            <span class="badge easy">Easy</span>
        </div>

        <div class="card">
            <h3>Chicken Tacos</h3>
            <p>Mexican | 27 min | 4 servings</p>
            <p>Rating: 4.5/5</p>
            <span class="badge medium">Medium</span>
        </div>

    </div>

    <div class="container" id="recipecontainer"></div>

    <script>
        const recipes=[
            {name:"Classic Maegherita Pizza",cuision:"Italian",time:35,servings:4,rating:4.6,difficulty;"Easy"},
        ]
    </script>

</body>
</html>
